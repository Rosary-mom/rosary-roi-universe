<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rosary-roi-universe | Risk-ROI 2026 Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f766e, #10b981); font-family: system-ui; }
        .ticker { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
        .news-item { transition: all 0.3s; }
        .news-item:hover { transform: translateX(8px); background: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-bold">Risk-ROI-Universum 2026</h1>
                <p class="text-xl opacity-90">Bio2.0 + Templer-Leverage + IOR • Live mit World Monitor</p>
            </div>
            <div class="text-right">
                <div class="text-emerald-300 text-sm">Aktualisiert: <span id="last-update">gerade eben</span></div>
            </div>
        </div>

        <!-- TICKER BAR -->
        <div class="ticker flex overflow-x-auto gap-8 py-4 px-6 rounded-3xl mb-12 text-lg font-mono">
            <div id="ticker-spy" class="flex-shrink-0">S&P 500: <span class="font-bold text-emerald-300">---</span></div>
            <div id="ticker-btc" class="flex-shrink-0">Bitcoin: <span class="font-bold text-amber-300">---</span></div>
            <div id="ticker-gold" class="flex-shrink-0">Gold: <span class="font-bold text-yellow-300">---</span></div>
            <div id="ticker-silver" class="flex-shrink-0">Silber: <span class="font-bold text-gray-300">---</span></div>
            <div id="ticker-eurusd" class="flex-shrink-0">EUR/USD: <span class="font-bold text-sky-300">---</span></div>
        </div>

        <!-- CHART -->
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 shadow-2xl">
            <h2 class="text-3xl font-bold mb-6 text-center">Live Risk-ROI-Universum</h2>
            <canvas id="roiChart" height="140"></canvas>
        </div>

        <!-- WORLD MONITOR BREAKING NEWS -->
        <div class="mt-12">
            <div class="flex items-center gap-4 mb-6">
                <i class="fas fa-bolt text-3xl text-red-400"></i>
                <h2 class="text-3xl font-bold">World Monitor Breaking News</h2>
            </div>
            <div id="news-feed" class="space-y-4">
                <!-- JS wird hier gefüllt -->
            </div>
        </div>
    </div>

    <script>
        // === RISK-ROI CHART ===
        const ctx = document.getElementById('roiChart');
        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Traditionelle Märkte', data: [{x:7.5, y:11}], backgroundColor: '#ef4444', pointRadius: 22, label: 'S&P 500' },
                    { label: 'Green Deal', data: [{x:5.5, y:10}], backgroundColor: '#eab308', pointRadius: 20 },
                    { label: 'Bio2.0 + Templer + IOR', data: [{x:2.2, y:35}], backgroundColor: '#10b981', pointRadius: 32 }
                ]
            },
            options: {
                plugins: { legend: { labels: { color: '#fff', font: { size: 16 } } } },
                scales: {
                    x: { min: 0, max: 10, title: { display: true, text: 'Risiko (0 = niedrig, 10 = hoch)', color: '#fff' }, grid: { color: 'rgba(255,255,255,0.2)' } },
                    y: { min: 0, max: 40, title: { display: true, text: 'ROI % 2025–2030', color: '#fff' }, grid: { color: 'rgba(255,255,255,0.2)' } }
                }
            }
        });

        // === LIVE TICKERS (CoinGecko + Yahoo unofficial + free endpoints) ===
        async function updateTickers() {
            const urls = {
                btc: 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd',
                gold: 'https://www.goldapi.io/api/XAU/USD', // free tier
                spy: 'https://query1.finance.yahoo.com/v8/finance/chart/^GSPC',
                silver: 'https://api.coingecko.com/api/v3/simple/price?ids=silver&vs_currencies=usd',
                eurusd: 'https://api.exchangerate-api.com/v4/latest/EUR'
            };

            // BTC
            fetch(urls.btc).then(r => r.json()).then(d => document.getElementById('ticker-btc').innerHTML = `Bitcoin: <span class="font-bold text-amber-300">$${d.bitcoin.usd.toLocaleString()}</span>`);

            // Gold (falls GoldAPI Key später hinzufügen, sonst mock)
            document.getElementById('ticker-gold').innerHTML = `Gold: <span class="font-bold text-yellow-300">$2,650</span> <span class="text-xs">+1.8%</span>`;

            // S&P (Yahoo)
            fetch('https://query1.finance.yahoo.com/v8/finance/chart/^GSPC?interval=1m').then(r => r.json()).then(d => {
                const price = d.chart.result[0].meta.regularMarketPrice;
                document.getElementById('ticker-spy').innerHTML = `S&P 500: <span class="font-bold text-emerald-300">${price.toFixed(2)}</span>`;
            });

            // Update Zeit
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('de-DE');
        }
        setInterval(updateTickers, 30000);
        updateTickers();

        // === WORLD MONITOR BREAKING NEWS (fetch aus eurem worldmonitor Repo oder RSS) ===
        async function loadNews() {
            const feed = document.getElementById('news-feed');
            // Beispiel-Feed – später durch echten World-Monitor API ersetzen
            const newsItems = [
                { time: "09:27", headline: "Trump-Tarife stabilisieren Märkte – Bio2.0 als Safe Haven gefragt", source: "World Monitor" },
                { time: "09:15", headline: "Gold +2,3 % – World Monitor warnt vor weiterer Volatilität", source: "World Monitor" },
                { time: "08:58", headline: "ROSARY Holding: 1.247.000 € Crowdfunding-Ziel erreicht", source: "Rosary News" }
            ];

            newsItems.forEach(item => {
                feed.innerHTML += `
                    <div class="news-item bg-white/10 p-6 rounded-2xl flex gap-6">
                        <div class="text-xs font-mono opacity-75 w-16">${item.time}</div>
                        <div>
                            <div class="font-semibold">${item.headline}</div>
                            <div class="text-xs opacity-75">${item.source}</div>
                        </div>
                    </div>`;
            });
        }
        loadNews();
    </script>
</body>
</html>
