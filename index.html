<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rosary©®™-roi-universe | Risk-ROI 2026 Live mit World Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f766e, #10b981); font-family: system-ui; }
        .ticker { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
        .news-item { transition: all 0.3s; }
        .news-item:hover { transform: translateX(8px); background: rgba(255,255,255,0.15); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-bold">Risk-ROI-Universum 2026</h1>
                <p class="text-xl opacity-90">Bio2.0 + Templer-Leverage + IOR • Live mit <strong>World Monitor</strong></p>
            </div>
            <div class="text-right">
                <div class="text-emerald-300 text-sm">World Monitor • Aktualisiert: <span id="last-update">gerade eben</span></div>
            </div>
        </div>

        <!-- TICKER -->
        <div class="ticker flex overflow-x-auto gap-8 py-4 px-6 rounded-3xl mb-12 text-lg font-mono whitespace-nowrap">
            <div id="ticker-spy">S&P 500: <span class="font-bold text-emerald-300">---</span></div>
            <div id="ticker-btc">Bitcoin: <span class="font-bold text-amber-300">---</span></div>
            <div id="ticker-gold">Gold: <span class="font-bold text-yellow-300">---</span></div>
            <div id="ticker-silver">Silber: <span class="font-bold text-gray-300">---</span></div>
            <div id="ticker-eurusd">EUR/USD: <span class="font-bold text-sky-300">---</span></div>
        </div>

        <!-- CHART -->
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 shadow-2xl mb-12">
            <h2 class="text-3xl font-bold mb-6 text-center">Live Risk-ROI-Universum</h2>
            <canvas id="roiChart" height="140"></canvas>
        </div>

        <!-- ECHTER WORLD MONITOR FEED -->
        <div class="mt-8">
            <div class="flex items-center gap-4 mb-6">
                <i class="fas fa-bolt text-3xl text-red-400"></i>
                <h2 class="text-3xl font-bold">World Monitor Breaking News <span class="text-sm font-normal opacity-75">(echt aus worldmonitor-Repo)</span></h2>
            </div>
            <div id="news-feed" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // === RISK-ROI CHART (wie zuvor) ===
        const ctx = document.getElementById('roiChart');
        new Chart(ctx, { /* ... unverändert aus vorheriger Version ... */ });

        // === LIVE TICKERS (unverändert) ===
        async function updateTickers() { /* ... unverändert ... */ }
        setInterval(updateTickers, 30000); updateTickers();

        // === ECHTER WORLD MONITOR FEED ===
        async function loadWorldMonitorNews() {
            const feed = document.getElementById('news-feed');
            try {
                const res = await fetch('https://raw.githubusercontent.com/Rosary-mom/worldmonitor/main/data/breaking-news.json');
                const data = await res.json();

                feed.innerHTML = '';
                data.items.forEach(item => {
                    feed.innerHTML += `
                        <div class="news-item bg-white/10 p-6 rounded-2xl flex gap-6">
                            <div class="text-xs font-mono opacity-75 w-16 shrink-0">${item.time}</div>
                            <div class="flex-1">
                                <div class="font-semibold leading-tight">${item.headline}</div>
                                <div class="text-xs opacity-75 mt-1">${item.source} • ${item.category}</div>
                            </div>
                        </div>`;
                });

                document.getElementById('last-update').textContent = new Date(data.lastUpdated).toLocaleTimeString('de-DE');
            } catch (e) {
                feed.innerHTML = `<div class="bg-red-500/20 p-6 rounded-2xl">World Monitor Feed temporär nicht erreichbar – bitte breaking-news.json in worldmonitor/data prüfen.</div>`;
            }
        }
        setInterval(loadWorldMonitorNews, 60000); // alle 60 Sekunden aktualisieren
        loadWorldMonitorNews();
    </script>
</body>
</html>
